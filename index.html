<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Kanban Board</h1>
    <div class="board">
      <div class="column">
        <h2>Todo</h2>
        <div class="task-list" id="todo"></div>
        <button onclick="addTask('todo')">+ Add Task</button>
      </div>

      <div class="column">
        <h2>In Progress</h2>
        <div class="task-list" id="progress"></div>
        <button onclick="addTask('progress')">+ Add Task</button>
      </div>

      <div class="column">
        <h2>Done</h2>
        <div class="task-list" id="done"></div>
        <button onclick="addTask('done')">+ Add Task</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
