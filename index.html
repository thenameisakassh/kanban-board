<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Kanban Board</h1>
    <div class="task-input">
      <input type="text" id="taskInput" placeholder="Enter task" />

      <select id="priority">
        <option value="high">High Priority</option>
        <option value="medium">Medium Priority</option>
        <option value="low">Low Priority</option>
      </select>

      <input type="date" id="dueDate" />
    </div>

    <div class="board">
      <div class="column">
        <h2>Todo (<span id="todo-count">0</span>)</h2>
        <div class="task-list" id="todo"></div>
        <button onclick="addTask('todo')">+ Add Task</button>
      </div>

      <div class="column">
        <h2>In Progress (<span id="progress-count">0</span>)</h2>
        <div class="task-list" id="progress"></div>
        <button onclick="addTask('progress')">+ Add Task</button>
      </div>

      <div class="column">
        <h2>Done (<span id="done-count">0</span>)</h2>
        <div class="task-list" id="done"></div>
        <button onclick="addTask('done')">+ Add Task</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
